<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(rgba(0,102,204,0.85), rgba(0,51,153,0.9)),
    url('https://images.unsplash.com/photo-1559526324-4b87b5e36e44');
    background-size:cover;
    color:white;
}

.top {
    display:flex;
    justify-content:space-between;
    padding:20px;
}

.container {
    padding:30px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="top">
    <h2>Dashboard</h2>
    <a href="index.html" style="color:white;">Logout</a>
</div>

<div class="container">
    <div class="grid">
        <div class="card">
            <h3>Balance</h3>
            <h1>$12,450</h1>
        </div>

        <div class="card">
            <h3>Account</h3>
            <p>Checking</p>
        </div>

        <div class="card">
            <h3>Recent Transactions</h3>
            <p>+ $2000 Deposit</p>
            <p>- $150 Transfer</p>
            <p>- $80 Shopping</p>
        </div>
    </div>
</div>

</body>
</html>
