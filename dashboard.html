<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; min-height:100vh; background:linear-gradient(rgba(0,102,204,0.82), rgba(0,51,153,0.92)), url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=1600&q=80'); background-size:cover; background-position:center; background-repeat:no-repeat; color:white;">

<div style="display:flex; justify-content:space-between; align-items:center; padding:20px 28px; background:rgba(0,0,0,0.28);">
  <div style="font-size:28px; font-weight:bold;">Norman FCU</div>
  <div>
    <a href="index.html" style="color:white; text-decoration:none; margin-left:18px;">Home</a>
    <a href="transactions.html" style="color:white; text-decoration:none; margin-left:18px;">Transactions</a>
    <a href="transfer.html" style="color:white; text-decoration:none; margin-left:18px;">Transfer</a>
    <a href="#" onclick="logout()" style="color:white; text-decoration:none; margin-left:18px;">Logout</a>
  </div>
</div>

<div style="padding:30px; display:flex; flex-wrap:wrap; gap:24px;">

  <div style="flex:1 1 320px; max-width:420px; background:linear-gradient(135deg,#00c6ff,#0072ff); border-radius:18px; padding:28px; box-shadow:0 12px 30px rgba(0,0,0,0.22);">
    <div style="font-size:14px; opacity:.95;">Available Balance</div>
    <div id="balanceBox" style="font-size:40px; font-weight:bold; margin-top:10px;">$0.00</div>
    <div id="accountInfo" style="margin-top:16px; font-size:14px;"></div>
  </div>

  <div style="flex:1 1 320px; max-width:420px; background:rgba(255,255,255,0.16); backdrop-filter:blur(10px); border-radius:18px; padding:26px;">
    <h3 style="margin-top:0;">User Details</h3>
    <div id="userInfo"></div>
    <div style="margin-top:18px;">
      <a href="transfer.html" style="display:inline-block; padding:12px 18px; margin:6px 8px 6px 0; border-radius:8px; text-decoration:none; font-weight:bold; background:white; color:#003366;">Send Money</a>
      <a href="transactions.html" style="display:inline-block; padding:12px 18px; margin:6px 8px 6px 0; border-radius:8px; text-decoration:none; font-weight:bold; background:#00c2ff; color:white;">View Transactions</a>
    </div>
  </div>

</div>

<div style="padding:0 30px 30px;">
  <div style="background:rgba(255,255,255,0.14); backdrop-filter:blur(10px); border-radius:18px; padding:24px;">
    <h2 style="margin-top:0;">Recent Transactions</h2>
    <div id="txBox"></div>
  </div>
</div>

<script>
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function getCurrentUser() {
  const id = localStorage.getItem("currentUserId");
  const users = getUsers();
  return users.find(u => String(u.id) === String(id));
}

function logout() {
  localStorage.removeItem("currentUserId");
  window.location = "login.html";
}

const user = getCurrentUser();

if (!user) {
  alert("Please login first");
  window.location = "login.html";
} else {
  document.getElementById("balanceBox").textContent = "$" + Number(user.balance).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById("accountInfo").innerHTML = `
    <div>Account No: ${user.account}</div>
    <div>Routing No: ${user.routing}</div>
  `;
  document.getElementById("userInfo").innerHTML = `
    <p><b>Name:</b> ${user.name}</p>
    <p><b>Email:</b> ${user.email}</p>
  `;

  document.getElementById("txBox").innerHTML = (user.transactions || []).map(tx => `
    <div style="display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.2);">
      <div>
        <div style="font-weight:bold;">${tx.title}</div>
        <div style="font-size:13px; opacity:.9;">${tx.date}</div>
      </div>
      <div style="font-weight:bold;">${tx.amount}</div>
    </div>
  `).join("");
}
</script>

</body>
</html>
