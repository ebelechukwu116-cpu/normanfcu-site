<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body style="margin:0; font-family:Arial,sans-serif; background:linear-gradient(135deg,#000000,#3b0000,#5b0000); color:white; min-height:100vh;">

  <div style="display:flex; justify-content:space-between; align-items:center; padding:20px; background:#111;">
    <h2 style="margin:0; color:red;">Norman FCU</h2>
    <button id="logoutBtn" style="background:red; color:white; border:none; padding:10px 14px; border-radius:8px; cursor:pointer;">
      Logout
    </button>
  </div>

  <div id="loading" style="padding:40px; text-align:center; font-size:20px;">
    Loading your dashboard...
  </div>

  <div id="app" style="display:none; padding:30px; max-width:1000px; margin:auto;">

    <div style="background:#111; padding:25px; border-radius:16px; box-shadow:0 0 20px rgba(255,0,0,0.18); margin-bottom:24px;">
      <div style="font-size:14px; color:#f0caca;">Available Balance</div>
      <h1 id="balance" style="font-size:42px; margin:10px 0;">$0.00</h1>
      <p id="accountNumber" style="margin:6px 0;"></p>
      <p id="routingNumber" style="margin:6px 0;"></p>
    </div>

    <div style="background:#111; padding:25px; border-radius:16px; box-shadow:0 0 20px rgba(255,0,0,0.18);">
      <h3 style="margin-top:0;">Profile</h3>
      <p id="name"></p>
      <p id="email"></p>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDa9f0xnUb-xvhByuRo1q0_HMQ14V4JITc",
      authDomain: "adovest-7obch3.firebaseapp.com",
      projectId: "adovest-7obch3",
      storageBucket: "adovest-7obch3.firebasestorage.app",
      messagingSenderId: "678461021523",
      appId: "1:678461021523:web:eee791ec001c2826a815a6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loading = document.getElementById("loading");
    const appBox = document.getElementById("app");

    const balanceEl = document.getElementById("balance");
    const accountNumberEl = document.getElementById("accountNumber");
    const routingNumberEl = document.getElementById("routingNumber");
    const nameEl = document.getElementById("name");
    const emailEl = document.getElementById("email");

    function formatMoney(value) {
      const num = Number(value) || 0;
      return "$" + num.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    async function loadUserData(user) {
      try {
        const snap = await getDoc(doc(db, "users", user.uid));

        if (snap.exists()) {
          const data = snap.data();
          balanceEl.textContent = formatMoney(data.balance);
          accountNumberEl.textContent = "Account Number: " + (data.accountNumber || "--");
          routingNumberEl.textContent = "Routing Number: " + (data.routingNumber || "--");
          nameEl.textContent = "Name: " + (data.name || data.fullName || "--");
          emailEl.textContent = "Email: " + (data.email || user.email || "--");
        } else {
          balanceEl.textContent = "$0.00";
          accountNumberEl.textContent = "Account Number: --";
          routingNumberEl.textContent = "Routing Number: --";
          nameEl.textContent = "Name: --";
          emailEl.textContent = "Email: " + (user.email || "--");
        }

        loading.style.display = "none";
        appBox.style.display = "block";
      } catch (err) {
        loading.textContent = "Failed to load dashboard: " + err.message;
      }
    }

    await setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await loadUserData(user);
      } else {
        window.location.href = "login.html";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
