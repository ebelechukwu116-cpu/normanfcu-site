<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Norman FCU</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#000000,#3b0000,#5b0000); color:white;">

<!-- NAV -->
<div style="display:flex; justify-content:space-between; padding:20px; background:#111;">
  <h2 style="margin:0; color:red;">Norman FCU</h2>
  <button onclick="logout()" style="background:red; color:white; border:none; padding:10px; border-radius:6px;">Logout</button>
</div>

<!-- MAIN -->
<div style="padding:30px;">

  <h2>Dashboard</h2>

  <!-- BALANCE CARD -->
  <div style="background:#111; padding:25px; border-radius:12px; margin-top:20px; box-shadow:0 0 20px rgba(255,0,0,0.2);">
    
    <h3 style="color:red;">Available Balance</h3>
    <h1 id="balance">$0.00</h1>

    <p id="account"></p>
    <p id="routing"></p>

  </div>

  <!-- TRANSACTIONS -->
  <div style="margin-top:30px;">
    <h3>Recent Transactions</h3>
    <div id="transactions"></div>
  </div>

</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
  messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
  appId: "PASTE_YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const balanceEl = document.getElementById("balance");
const accountEl = document.getElementById("account");
const routingEl = document.getElementById("routing");
const txEl = document.getElementById("transactions");

function animateBalance(target){
  let current = 0;
  const step = target / 50;

  const timer = setInterval(() => {
    current += step;
    if(current >= target){
      current = target;
      clearInterval(timer);
    }

    balanceEl.innerText = "$" + current.toLocaleString(undefined,{
      minimumFractionDigits:2,
      maximumFractionDigits:2
    });

  },20);
}

onAuthStateChanged(auth, async (user) => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  const uid = user.uid;

  // GET USER DATA
  const userDoc = await getDoc(doc(db,"users",uid));

  if(userDoc.exists()){
    const data = userDoc.data();

    const balance = Number(data.balance) || 0;

    animateBalance(balance);

    accountEl.innerText = "Account Number: " + data.accountNumber;
    routingEl.innerText = "Routing Number: " + data.routingNumber;
  }

  // GET TRANSACTIONS
  const querySnapshot = await getDocs(collection(db,"users",uid,"transactions"));

  txEl.innerHTML = "";

  querySnapshot.forEach(doc => {
    const tx = doc.data();

    txEl.innerHTML += `
      <div style="background:#111; padding:15px; margin-top:10px; border-radius:8px;">
        <strong>${tx.title}</strong><br>
        ${tx.amount} - ${tx.date}
      </div>
    `;
  });

});

// LOGOUT
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href = "login.html";
  });
};

</script>

</body>
</html>
