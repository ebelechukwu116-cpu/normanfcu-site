<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Norman FCU</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(rgba(0,102,204,0.85), rgba(0,51,153,0.95)), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d'); background-size:cover; color:white;">

<!-- HEADER -->
<div style="display:flex; justify-content:space-between; padding:20px; background:rgba(0,0,0,0.3);">
    <h2>Norman FCU</h2>
    <div>
        <a href="transactions.html" style="color:white; margin-right:15px;">Transactions</a>
        <a href="transfer.html" style="color:white;">Transfer</a>
    </div>
</div>

<!-- CONTENT -->
<div style="padding:30px;">

    <!-- BALANCE CARD -->
    <div style="background:rgba(255,255,255,0.15); padding:20px; border-radius:15px; backdrop-filter:blur(10px);">
        <h3>Available Balance</h3>
        <h1>$12,450.75</h1>
        <p>Account: <span id="acc"></span></p>
        <p>Routing: <span id="route"></span></p>
    </div>

    <!-- ACTION BUTTONS -->
    <div style="margin-top:20px;">
        <a href="transfer.html" style="padding:10px 20px; background:#007bff; color:white; border-radius:8px; text-decoration:none;">Send Money</a>
        <a href="transactions.html" style="padding:10px 20px; background:white; color:#007bff; border-radius:8px; text-decoration:none; margin-left:10px;">View Transactions</a>
    </div>

</div>

<script>
// GENERATE ACCOUNT NUMBER
function generateAccount(){
    return Math.floor(1000000000 + Math.random() * 9000000000);
}

// GENERATE ROUTING NUMBER
function generateRouting(){
    return Math.floor(100000000 + Math.random() * 900000000);
}

document.getElementById("acc").innerText = generateAccount();
document.getElementById("route").innerText = generateRouting();
</script>

</body>
</html>
