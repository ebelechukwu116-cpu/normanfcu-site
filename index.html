<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: rgba(255,255,255,0.15);
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Styling Works</h1>
    <p>If you see a blue gradient background, the file is loading correctly.</p>
  </div>
</body>
</html>
