<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Norman FCU</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#000000,#5b0000); color:white;">

<!-- TOP BAR -->
<div style="display:flex; justify-content:space-between; padding:20px; background:#111;">
  <h2 style="margin:0; color:red;">Norman FCU</h2>
  <a href="index.html" style="color:white; text-decoration:none;">Logout</a>
</div>

<!-- MAIN -->
<div style="padding:30px;">

  <h2>Dashboard</h2>

  <!-- CARD UI -->
  <div style="background:#111; padding:25px; border-radius:12px; margin-top:20px; box-shadow:0 0 20px rgba(255,0,0,0.2);">
    
    <h3 style="color:red;">Available Balance</h3>
    
    <h1 id="balance" style="font-size:40px;">$0</h1>

    <p id="accountNumber"></p>
    <p id="routingNumber"></p>

  </div>

  <!-- ACTIONS -->
  <div style="margin-top:30px;">
    <a href="transfer.html" style="padding:12px 20px; background:red; color:white; text-decoration:none; border-radius:6px;">Transfer</a>
    <a href="transactions.html" style="padding:12px 20px; background:#222; color:white; text-decoration:none; border-radius:6px;">Transactions</a>
  </div>

</div>

<!-- SCRIPT -->
<script>

// GENERATORS
function generateAccountNumber() {
  return String(Math.floor(1000000000 + Math.random() * 9000000000));
}

function generateRoutingNumber() {
  return "021000021";
}

// SET VALUES
const accountNumber = generateAccountNumber();
const routingNumber = generateRoutingNumber();

document.getElementById("accountNumber").innerText = "Account Number: " + accountNumber;
document.getElementById("routingNumber").innerText = "Routing Number: " + routingNumber;

// ANIMATED BALANCE
let balance = 0;
let target = 12450;

let interval = setInterval(() => {
  balance += 150;

  if(balance >= target){
    balance = target;
    clearInterval(interval);
  }

  document.getElementById("balance").innerText = "$" + balance.toLocaleString();

}, 30);

</script>

</body>
</html>
