<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - Norman FCU Demo</title>
</head>
<body style="margin:0; font-family:Arial,sans-serif; min-height:100vh; background:linear-gradient(rgba(0,102,204,0.82), rgba(0,51,153,0.92)), url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80'); background-size:cover; background-position:center; color:white;">

<div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">
  <div style="width:100%; max-width:360px; background:rgba(255,255,255,0.96); color:black; padding:28px; border-radius:16px; box-shadow:0 12px 30px rgba(0,0,0,0.25);">
    <h2 style="margin-top:0;">Admin Login</h2>
    <p style="color:#6b7280; font-size:14px;">Restricted demo access</p>

    <input id="adminPassword" type="password" placeholder="Enter admin password" style="width:100%; padding:12px; margin:10px 0; border:1px solid #d1d5db; border-radius:8px;">

    <button onclick="adminLogin()" style="width:100%; padding:12px; background:#0ea5e9; color:white; border:none; border-radius:8px; font-weight:bold;">Login</button>

    <div style="margin-top:14px;">
      <a href="dashboard.html">Back to Dashboard</a>
    </div>
  </div>
</div>

<script>
function adminLogin() {
  const password = document.getElementById("adminPassword").value.trim();

  if (password === "admin123") {
    localStorage.setItem("adminAccess", "true");
    window.location = "admin.html";
  } else {
    alert("Wrong admin password");
  }
}
</script>

</body>
</html>
