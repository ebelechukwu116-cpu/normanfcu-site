<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(rgba(0,102,204,0.85), rgba(0,51,153,0.9)),
    url('https://images.unsplash.com/photo-1563013544-824ae1b704d3');
    background-size:cover;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:rgba(0,0,0,0.4);
    padding:30px;
    border-radius:10px;
    width:300px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    width:100%;
    padding:10px;
    background:#00ccff;
    border:none;
    color:white;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login(){
    window.location.href="dashboard.html";
}
</script>

</body>
</html>
