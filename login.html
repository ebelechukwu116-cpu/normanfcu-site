<!DOCTYPE html>
<html>
<head>
<title>Login - Norman FCU</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1e3c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #1e40af;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Account Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <a href="dashboard.html">
        <button>Login</button>
    </a>
</div>

</body>
</html>
