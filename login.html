<!DOCTYPE html>
<html>
<head>
<title>Login - Norman FCU</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #dbeafe, #ffffff);
}

/* NAVBAR */
.navbar {
    background: #0a3d91;
    color: white;
    padding: 15px 30px;
}

/* CENTER BOX */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.login-box {
    background: white;
    padding: 30px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    color: #0a3d91;
}

/* INPUTS */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #0a3d91;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* LINKS */
.links {
    margin-top: 10px;
}

.links a {
    color: #0a3d91;
    text-decoration: none;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Norman FCU</h2>
</div>

<div class="container">
    <div class="login-box">
        <h2>Account Login</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <div class="links">
            <a href="signup.html">Create Account</a><br>
            <a href="admin.html">Admin Panel</a>
        </div>
    </div>
</div>

<script>
function login() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
