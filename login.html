<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #3b0000, #5b0000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-sizing: border-box;
    }
    h2 {
      margin: 0 0 10px;
      color: #5b0000;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #f2f2f2;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: red;
      color: white;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    #msg {
      margin-top: 12px;
      color: red;
      min-height: 20px;
    }
    a {
      display: block;
      margin-top: 10px;
      text-align: center;
      color: red;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Login</h2>
    <p>Secure member access</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button type="button" id="loginBtn">Login</button>

    <p id="msg"></p>

    <a href="signup.html">Need an account? Create one</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDa9f0xnUb-xvhByuRo1q0_HMQ14V4JITc",
      authDomain: "adovest-7obch3.firebaseapp.com",
      projectId: "adovest-7obch3",
      storageBucket: "adovest-7obch3.firebasestorage.app",
      messagingSenderId: "678461021523",
      appId: "1:678461021523:web:eee791ec001c2826a815a6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        msg.innerText = "Enter email and password";
        return;
      }

      try {
        loginBtn.disabled = true;
        msg.style.color = "black";
        msg.innerText = "Signing in...";

        await signInWithEmailAndPassword(auth, email, password);

        msg.style.color = "green";
        msg.innerText = "Login successful";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);
      } catch (error) {
        msg.style.color = "red";
        msg.innerText = error.message;
      } finally {
        loginBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
