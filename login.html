<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>
<body style="margin:0; font-family:Arial,sans-serif; min-height:100vh; background:linear-gradient(135deg,#000000,#3b0000,#5b0000); color:white; display:flex; align-items:center; justify-content:center;">

  <div style="width:100%; max-width:950px; display:grid; grid-template-columns:1fr 1fr; gap:30px; align-items:center; padding:30px; box-sizing:border-box;">

    <div>
      <div style="display:inline-block; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,0.08); margin-bottom:18px;">
        Secure sign in
      </div>

      <h1 style="font-size:48px; margin:0 0 14px;">Welcome back</h1>
      <p style="font-size:18px; color:#e5e7eb; line-height:1.6; max-width:500px;">
        Login to access your account, balance, transfers, and recent activity.
      </p>
    </div>

    <div style="background:white; color:#111827; padding:30px; border-radius:18px; box-shadow:0 20px 45px rgba(0,0,0,0.25);">
      <h2 style="margin:0 0 10px; color:#5b0000; font-size:36px;">Login</h2>
      <p style="margin:0 0 20px; color:#6b7280;">Secure member access</p>

      <input id="email" type="email" placeholder="Email" style="width:100%; padding:14px; margin:8px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box; font-size:16px;">
      <input id="password" type="password" placeholder="Password" style="width:100%; padding:14px; margin:8px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box; font-size:16px;">

      <button type="button" id="loginBtn" style="width:100%; padding:14px; margin-top:12px; border:none; border-radius:10px; background:#dc2626; color:white; font-weight:bold; font-size:16px; cursor:pointer;">
        Login
      </button>

      <p id="msg" style="margin-top:14px; min-height:20px; color:#b91c1c;"></p>

      <a href="signup.html" style="display:block; text-align:center; margin-top:14px; color:#b91c1c; text-decoration:none; font-weight:bold;">
        Need an account? Create one
      </a>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDa9f0xnUb-xvhByuRo1q0_HMQ14V4JITc",
      authDomain: "adovest-7obch3.firebaseapp.com",
      projectId: "adovest-7obch3",
      storageBucket: "adovest-7obch3.firebasestorage.app",
      messagingSenderId: "678461021523",
      appId: "1:678461021523:web:eee791ec001c2826a815a6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        msg.innerText = "Enter email and password";
        return;
      }

      try {
        loginBtn.disabled = true;
        msg.style.color = "#111827";
        msg.innerText = "Signing in...";

        await signInWithEmailAndPassword(auth, email, password);

        msg.style.color = "green";
        msg.innerText = "Login successful";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);
      } catch (error) {
        msg.style.color = "#b91c1c";
        msg.innerText = error.message;
      } finally {
        loginBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
