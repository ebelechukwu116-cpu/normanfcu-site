<!DOCTYPE html>
<html>
<head>
  <title>Login - Norman FCU Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #0f172a;
    }
    .box {
      background: white;
      width: 340px;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h2 {
      margin-top: 0;
      text-align: center;
    }
    .demo {
      font-size: 12px;
      text-align: center;
      color: #475569;
      margin-bottom: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #0ea5e9;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Account Login</h2>
    <div class="demo">Demo environment only</div>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <a href="signup.html">Create a new account</a>
    <a href="admin.html">Open admin panel</a>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const user = JSON.parse(localStorage.getItem("demoUser"));

      if (!user) {
        alert("No demo account found. Please create one first.");
        return;
      }

      if (user.email === email && user.password === password) {
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid demo login details.");
      }
    }
  </script>
</body>
</html>
