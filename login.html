<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Norman FCU Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,102,204,0.85), rgba(0,51,153,0.9)),
      url('https://images.unsplash.com/photo-1563013544-824ae1b704d3?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: rgba(0,0,0,0.45);
      padding: 30px;
      border-radius: 14px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h2 {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00ccff;
      border: none;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    a {
      color: white;
    }

    #chatButton {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #00ccff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      z-index: 9999;
    }

    #chatBox {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 320px;
      max-width: 90vw;
      background: white;
      color: #111827;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
      overflow: hidden;
      z-index: 9999;
    }

    #chatHeader {
      background: linear-gradient(135deg,#00c6ff,#0072ff);
      color: white;
      padding: 14px;
      font-weight: bold;
    }

    #chatMessages {
      height: 240px;
      overflow-y: auto;
      padding: 10px;
      background: #f1f5f9;
    }

    .botMsg {
      background: #e0f2fe;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .userMsg {
      background: #00ccff;
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
      text-align: right;
    }

    .chatInputWrap {
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    .chatInputWrap input {
      margin: 0 0 8px 0;
      border: 1px solid #ccc;
    }

    .chatInputWrap button {
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Login</h2>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p style="margin-top:12px;"><a href="signup.html">Create Account</a></p>
  </div>

  <div id="chatButton" onclick="toggleChat()">💬</div>

  <div id="chatBox">
    <div id="chatHeader">
      Live Support
      <span onclick="toggleChat()" style="float:right; cursor:pointer;">✖</span>
    </div>

    <div id="chatMessages">
      <div class="botMsg">Hello 👋 Welcome to support. How can we help you today?</div>
    </div>

    <div class="chatInputWrap">
      <input id="chatInput" placeholder="Type message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function login() {
      window.location.href = "dashboard.html";
    }

    function toggleChat() {
      const box = document.getElementById("chatBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
    }

    function sendMessage() {
      const input = document.getElementById("chatInput");
      const msg = input.value.trim();
      if (!msg) return;

      const area = document.getElementById("chatMessages");

      const userDiv = document.createElement("div");
      userDiv.className = "userMsg";
      userDiv.textContent = msg;
      area.appendChild(userDiv);

      input.value = "";

      setTimeout(() => {
        const botDiv = document.createElement("div");
        botDiv.className = "botMsg";
        botDiv.textContent = "Thanks for reaching out. Support will assist you shortly.";
        area.appendChild(botDiv);
        area.scrollTop = area.scrollHeight;
      }, 700);
    }
  </script>

</body>
</html>
