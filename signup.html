<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#000,#3b0000,#5b0000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

h2 {
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background:#f2f2f2;
}

button {
  width:100%;
  padding:12px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-weight:bold;
}

#msg {
  margin-top:10px;
  color:red;
}

a {
  display:block;
  margin-top:10px;
  text-align:center;
  color:red;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="box">
  <h2>Create Account</h2>
  <p>Secure signup</p>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>

  <p id="msg"></p>

  <a href="login.html">Already have account? Login</a>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDa9f0xnUb-xvhByuRo1q0_HMQ14V4JITc",
  authDomain: "adovest-7obch3.firebaseapp.com",
  projectId: "adovest-7obch3",
  storageBucket: "adovest-7obch3.firebasestorage.app",
  messagingSenderId: "678461021523",
  appId: "1:678461021523:web:eee791ec001c2826a815a6"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// GENERATE ACCOUNT NUMBER
function generateAccountNumber() {
  return Math.floor(1000000000 + Math.random() * 9000000000);
}

// SIGNUP FUNCTION
window.signup = async function () {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !password || !name) {
    msg.innerText = "Fill all fields";
    return;
  }

  try {
    msg.innerText = "Creating account...";

    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    const user = userCred.user;

    // SAVE USER TO FIRESTORE
    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      balance: 10000,
      accountNumber: generateAccountNumber(),
      routingNumber: "07313287",
      createdAt: new Date()
    });

    msg.style.color = "green";
    msg.innerText = "Account created successfully";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (error) {
    msg.style.color = "red";
    msg.innerText = error.message;
  }
};
</script>

</body>
</html>
