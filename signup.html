<!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
</head>
<body style="margin:0; font-family:Arial; min-height:100vh; background:linear-gradient(rgba(0,102,204,0.8), rgba(0,51,153,0.9)), url('https://images.unsplash.com/photo-1554224154-22dec7ec8818?auto=format&fit=crop&w=1600&q=80'); background-size:cover; background-position:center; color:white;">

<div style="width:320px; margin:120px auto; background:white; padding:22px; border-radius:12px; color:black;">
  <h2>Create Account</h2>

  <input id="name" placeholder="Full Name" style="width:100%; padding:10px; margin:10px 0;">
  <input id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;">
  <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">

  <button onclick="createAccount()" style="width:100%; padding:12px; background:#0ea5e9; color:white; border:none; border-radius:8px;">Create Account</button>
</div>

<script>
function generateAccount() {
  return String(Math.floor(1000000000 + Math.random() * 9000000000));
}

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function createAccount() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    alert("Fill all fields");
    return;
  }

  const users = getUsers();
  if (users.some(u => u.email === email)) {
    alert("User already exists");
    return;
  }

  const newUser = {
    id: Date.now(),
    name,
    email,
    password,
    account: generateAccount(),
    routing: "021000021",
    balance: 12450.75,
    transactions: [
      { title: "Opening Balance", amount: "+ $12,450.75", date: "Apr 10, 2026" }
    ]
  };

  users.push(newUser);
  saveUsers(users);
  localStorage.setItem("currentUserId", String(newUser.id));

  alert("Account created");
  window.location = "dashboard.html";
}
</script>

</body>
</html>
