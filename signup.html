<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#000,#3b0000,#5b0000); color:white; display:flex; align-items:center; justify-content:center; min-height:100vh;">

<div style="background:white; color:black; padding:25px; border-radius:15px; width:90%; max-width:400px;">
  <h2>Create Account</h2>

  <input id="name" placeholder="Full Name" style="width:100%; padding:12px; margin:8px 0; box-sizing:border-box;">
  <input id="email" placeholder="Email" style="width:100%; padding:12px; margin:8px 0; box-sizing:border-box;">
  <input id="password" type="password" placeholder="Password" style="width:100%; padding:12px; margin:8px 0; box-sizing:border-box;">

  <button type="button" onclick="signup()" style="width:100%; padding:12px; background:red; color:white; border:none; border-radius:8px;">
    Create Account
  </button>

  <p id="msg"></p>

  <a href="login.html">Already have account? Login</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDa9f0xnUb-xvhByuRo1q0_HMQ14V4JITc",
  authDomain: "adovest-7obch3.firebaseapp.com",
  projectId: "adovest-7obch3",
  storageBucket: "adovest-7obch3.firebasestorage.app",
  messagingSenderId: "678461021523",
  appId: "1:678461021523:web:eee791ec001c2826a815a6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  try {
    msg.innerText = "Creating account...";
    await createUserWithEmailAndPassword(auth, email, password);
    msg.innerText = "Account created successfully";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);
  } catch (e) {
    msg.innerText = e.message;
  }
}
</script>

</body>
</html>
