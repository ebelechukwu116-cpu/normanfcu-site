<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(rgba(0,102,204,0.85), rgba(0,51,153,0.9)),
    url('https://images.unsplash.com/photo-1581090700227-1e8c7f3d9a1f');
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box {
    background:rgba(0,0,0,0.4);
    padding:30px;
    border-radius:10px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    width:100%;
    padding:10px;
    background:#00ccff;
    border:none;
    color:white;
}
</style>
</head>

<body>

<div class="box">
    <h2>Create Account</h2>
    <input placeholder="Full Name">
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="create()">Create Account</button>
</div>

<script>
function create(){
    alert("Account created!");
    window.location.href="login.html";
}
</script>

</body>
</html>
