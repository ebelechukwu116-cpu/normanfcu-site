<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Norman FCU Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(8, 30, 60, 0.45), rgba(8, 30, 60, 0.45)),
        url('https://images.unsplash.com/photo-1554224154-22dec7ec8818?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      background: rgba(255,255,255,0.96);
      width: 100%;
      max-width: 390px;
      padding: 26px;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.18);
    }

    h2 {
      margin-top: 0;
      color: #0a3d91;
      text-align: center;
    }

    .note {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #0ea5e9;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 12px;
      text-decoration: none;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Demo Account</h2>
    <div class="note">Demo environment only</div>

    <input id="fullname" type="text" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email Address">
    <input id="password" type="password" placeholder="Password">

    <select id="accountType">
      <option value="Checking">Checking</option>
      <option value="Savings">Savings</option>
    </select>

    <button onclick="signup()">Create Account</button>
    <a href="login.html">Back to Login</a>
  </div>

  <script>
    function generateAccountNumber() {
      return Math.floor(1000000000 + Math.random() * 9000000000).toString();
    }

    function generateCardLast4() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }

    function seedTransactions() {
      return [
        { title: "Opening Balance", date: "Apr 10, 2026", amount: 12450.75 },
        { title: "Demo Transfer", date: "Apr 10, 2026", amount: -85.00 },
        { title: "Card Purchase", date: "Apr 09, 2026", amount: -42.18 }
      ];
    }

    function signup() {
      const fullname = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const accountType = document.getElementById("accountType").value;

      if (!fullname || !email || !password) {
        alert("Please complete all fields.");
        return;
      }

      const user = {
        fullname,
        email,
        password,
        accountType,
        accountNumber: generateAccountNumber(),
        routingNumber: "021000021",
        balance: 12450.75,
        cardNumber: "**** **** **** " + generateCardLast4(),
        cardExpiry: "12/28",
        cardType: "Demo Debit",
        transactions: seedTransactions()
      };

      localStorage.setItem("demoUser", JSON.stringify(user));
      alert("Demo account created.");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
