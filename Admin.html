<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="margin:0; font-family:Arial; min-height:100vh; background:linear-gradient(rgba(0,102,204,0.82), rgba(0,51,153,0.92)), url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80'); background-size:cover; background-position:center; color:white;">

<div style="padding:20px; background:rgba(0,0,0,0.28); font-size:28px; font-weight:bold;">
  Norman FCU Admin
</div>

<div style="max-width:900px; margin:24px auto; background:rgba(255,255,255,0.95); color:black; padding:24px; border-radius:14px;">
  <h2>Manage Users</h2>

  <select id="userSelect" onchange="loadUser()" style="width:100%; padding:10px; margin:10px 0;"></select>

  <input id="balance" placeholder="Balance" style="width:100%; padding:10px; margin:10px 0;">
  <input id="account" placeholder="Account Number" style="width:100%; padding:10px; margin:10px 0;">
  <input id="routing" placeholder="Routing Number" style="width:100%; padding:10px; margin:10px 0;">

  <button onclick="saveUser()" style="padding:12px 18px; background:#0ea5e9; color:white; border:none; border-radius:8px;">Save Changes</button>
</div>

<script>
function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users) {
  localStorage.setItem("users", JSON.stringify(users));
}

function fillSelect() {
  const users = getUsers();
  const select = document.getElementById("userSelect");
  select.innerHTML = users.map(u => `<option value="${u.id}">${u.name} - ${u.email}</option>`).join("");
  if (users.length) loadUser();
}

function loadUser() {
  const users = getUsers();
  const id = document.getElementById("userSelect").value;
  const user = users.find(u => String(u.id) === String(id));
  if (!user) return;

  document.getElementById("balance").value = user.balance;
  document.getElementById("account").value = user.account;
  document.getElementById("routing").value = user.routing;
}

function saveUser() {
  const users = getUsers();
  const id = document.getElementById("userSelect").value;
  const i = users.findIndex(u => String(u.id) === String(id));
  if (i === -1) return;

  users[i].balance = parseFloat(document.getElementById("balance").value || "0");
  users[i].account = document.getElementById("account").value.trim();
  users[i].routing = document.getElementById("routing").value.trim();

  saveUsers(users);
  alert("User updated");
}

fillSelect();
</script>

</body>
</html>
