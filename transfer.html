<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer - Norman FCU</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#000000,#3b0000,#5b0000); color:white;">

<div style="display:flex; justify-content:space-between; padding:20px; background:#111;">
  <h2 style="margin:0; color:red;">Norman FCU</h2>
  <a href="dashboard.html" style="color:white; text-decoration:none;">Back</a>
</div>

<div style="max-width:500px; margin:40px auto; background:#111; padding:25px; border-radius:12px; box-shadow:0 0 20px rgba(255,0,0,0.2);">
  <h2 style="margin-top:0;">Transfer Funds</h2>

  <input id="recipient" type="text" placeholder="Recipient Name" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">
  <input id="bankName" type="text" placeholder="Recipient Bank" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">
  <input id="accountNumber" type="text" placeholder="Recipient Account Number" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">
  <input id="amount" type="number" placeholder="Amount" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">

  <button id="sendBtn" style="width:100%; padding:12px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">
    Send Transfer
  </button>

  <p id="status" style="margin-top:14px; color:#ffb3b3;"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
  messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
  appId: "PASTE_YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const recipientEl = document.getElementById("recipient");
const bankNameEl = document.getElementById("bankName");
const accountNumberEl = document.getElementById("accountNumber");
const amountEl = document.getElementById("amount");
const sendBtn = document.getElementById("sendBtn");
const statusEl = document.getElementById("status");

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
});

sendBtn.addEventListener("click", async () => {
  const recipient = recipientEl.value.trim();
  const bankName = bankNameEl.value.trim();
  const recipientAccount = accountNumberEl.value.trim();
  const amount = Number(amountEl.value);

  if (!recipient || !bankName || !recipientAccount || !amount) {
    statusEl.textContent = "Please complete all transfer fields.";
    return;
  }

  if (amount <= 0) {
    statusEl.textContent = "Amount must be greater than zero.";
    return;
  }

  if (!currentUser) {
    statusEl.textContent = "User not signed in.";
    return;
  }

  try {
    sendBtn.disabled = true;
    statusEl.textContent = "Processing transfer...";

    const uid = currentUser.uid;
    const userRef = doc(db, "users", uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      statusEl.textContent = "User profile not found.";
      sendBtn.disabled = false;
      return;
    }

    const userData = userSnap.data();
    const currentBalance = Number(userData.balance) || 0;

    if (amount > currentBalance) {
      statusEl.textContent = "Insufficient balance.";
      sendBtn.disabled = false;
      return;
    }

    const newBalance = currentBalance - amount;

    await updateDoc(userRef, {
      balance: newBalance
    });

    await addDoc(collection(db, "users", uid, "transactions"), {
      title: "Transfer to " + recipient,
      bankName: bankName,
      recipientAccount: recipientAccount,
      amount: "-$" + amount.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }),
      type: "debit",
      date: new Date().toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }),
      createdAt: serverTimestamp()
    });

    statusEl.style.color = "#9cffb0";
    statusEl.textContent = "Transfer successful.";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1200);

  } catch (err) {
    statusEl.textContent = err.message;
    sendBtn.disabled = false;
  }
});
</script>

</body>
</html>
