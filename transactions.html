<!DOCTYPE html>
<html>
<head>
<title>Transactions</title>

<style>
body{
    margin:0;
    font-family:Arial;

    /* 🔥 BLUE BACKGROUND WITH IMAGE */
    background: linear-gradient(rgba(0,102,204,0.8), rgba(0,51,153,0.9)),
    url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d');

    background-size:cover;
    background-position:center;
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    background:rgba(0,0,0,0.3);
    display:flex;
    align-items:center;
}

.logo{
    width:40px;
    height:40px;
    background:#007bff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

/* CARD STYLE */
.container{
    max-width:500px;
    margin:50px auto;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    backdrop-filter: blur(10px);
}

/* TRANSACTION ITEMS */
.item{
    padding:15px;
    margin:10px 0;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.green{ color:lightgreen; }
.red{ color:#ff6b6b; }

</style>
</head>

<body>

<div class="header">
    <div class="logo">N</div>
    <h3>Norman FCU</h3>
</div>

<div class="container">
    <h2>Transactions</h2>

    <div class="item">
        <span>Deposit</span>
        <span class="green">+$2000</span>
    </div>

    <div class="item">
        <span>Transfer</span>
        <span class="red">-$150</span>
    </div>

    <div class="item">
        <span>Shopping</span>
        <span class="red">-$80</span>
    </div>

</div>

</body>
</html>
