<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
</head>

<body style="margin:0; font-family:Arial; background:linear-gradient(135deg,#000000,#3b0000,#5b0000); color:white;">

<div style="display:flex; justify-content:space-between; padding:20px; background:#111;">
  <h2 style="margin:0; color:red;">Admin Panel</h2>
  <a href="dashboard.html" style="color:white; text-decoration:none;">Back</a>
</div>

<div style="max-width:600px; margin:40px auto; background:#111; padding:25px; border-radius:12px; box-shadow:0 0 20px rgba(255,0,0,0.2);">

  <h3>Manage User</h3>

  <input id="uid" placeholder="User UID" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
  <button onclick="loadUser()" style="width:100%; padding:12px; background:#333; color:white; border:none; border-radius:8px;">Load User</button>

  <hr style="margin:20px 0; border-color:#333;">

  <p id="userInfo"></p>

  <input id="balance" type="number" placeholder="New Balance" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
  <button onclick="updateBalance()" style="width:100%; padding:12px; background:red; color:white; border:none; border-radius:8px;">Update Balance</button>

  <hr style="margin:20px 0; border-color:#333;">

  <h3>Add Transaction</h3>

  <input id="title" placeholder="Title" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">
  <input id="amount" placeholder="Amount (e.g -500 or +200)" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none;">

  <button onclick="addTransaction()" style="width:100%; padding:12px; background:#ff2d2d; color:white; border:none; border-radius:8px;">
    Add Transaction
  </button>

  <p id="status" style="margin-top:15px; color:#ffb3b3;"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
  messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
  appId: "PASTE_YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUID = null;

window.loadUser = async function(){

  const uid = document.getElementById("uid").value.trim();

  if(!uid){
    document.getElementById("status").innerText = "Enter UID";
    return;
  }

  const userRef = doc(db,"users",uid);
  const snap = await getDoc(userRef);

  if(!snap.exists()){
    document.getElementById("status").innerText = "User not found";
    return;
  }

  currentUID = uid;

  const data = snap.data();

  document.getElementById("userInfo").innerText =
    "Name: " + data.fullName + " | Balance: $" + data.balance;

};

window.updateBalance = async function(){

  if(!currentUID){
    document.getElementById("status").innerText = "Load user first";
    return;
  }

  const newBalance = Number(document.getElementById("balance").value);

  if(isNaN(newBalance)){
    document.getElementById("status").innerText = "Invalid balance";
    return;
  }

  await updateDoc(doc(db,"users",currentUID),{
    balance: newBalance
  });

  document.getElementById("status").innerText = "Balance updated";

};

window.addTransaction = async function(){

  if(!currentUID){
    document.getElementById("status").innerText = "Load user first";
    return;
  }

  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;

  if(!title || !amount){
    document.getElementById("status").innerText = "Fill all fields";
    return;
  }

  await addDoc(collection(db,"users",currentUID,"transactions"),{
    title: title,
    amount: amount.startsWith("+") || amount.startsWith("-") ? amount : "-" + amount,
    date: new Date().toLocaleDateString(),
    createdAt: serverTimestamp()
  });

  document.getElementById("status").innerText = "Transaction added";

};

</script>

</body>
</html>
