<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Norman FCU</title>
</head>
<body style="margin:0; font-family:Arial,sans-serif; background:linear-gradient(135deg,#000000,#3b0000,#5b0000); color:white; min-height:100vh;">

  <div style="display:flex; justify-content:space-between; padding:20px; background:#111;">
    <h2 style="margin:0; color:red;">Admin Panel</h2>
    <div>
      <a href="dashboard.html" style="color:white; text-decoration:none; margin-right:14px;">Dashboard</a>
      <button id="logoutBtn" style="background:red; color:white; border:none; padding:10px 14px; border-radius:6px; cursor:pointer;">Logout</button>
    </div>
  </div>

  <div style="max-width:1000px; margin:30px auto; padding:0 20px; display:grid; grid-template-columns:320px 1fr; gap:22px;">

    <div style="background:#111; border-radius:14px; padding:20px; box-shadow:0 0 20px rgba(255,0,0,0.18);">
      <h3 style="margin-top:0;">Users</h3>
      <div id="adminState" style="font-size:13px; color:#ffb3b3; margin-bottom:14px;">Checking admin access...</div>
      <div id="userList" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <div style="background:#111; border-radius:14px; padding:20px; box-shadow:0 0 20px rgba(255,0,0,0.18);">
      <h3 style="margin-top:0;">Manage Selected User</h3>

      <div id="selectedInfo" style="margin-bottom:16px; color:#ddd;">No user selected.</div>

      <input id="balance" type="number" step="0.01" placeholder="New Balance" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">
      <input id="title" placeholder="Transaction Title" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">
      <input id="amount" placeholder="Amount (example: -$150.00 or +$2000.00)" style="width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; box-sizing:border-box;">

      <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
        <button id="updateBalanceBtn" style="padding:12px 16px; background:red; color:white; border:none; border-radius:8px; cursor:pointer;">
          Update Balance
        </button>

        <button id="addTxBtn" style="padding:12px 16px; background:#2a2a2a; color:white; border:none; border-radius:8px; cursor:pointer;">
          Add Transaction
        </button>
      </div>

      <div id="status" style="margin-top:16px; color:#ffb3b3;"></div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      onSnapshot,
      doc,
      getDoc,
      updateDoc,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY",
      authDomain: "PASTE_YOUR_AUTH_DOMAIN",
      projectId: "PASTE_YOUR_PROJECT_ID",
      storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
      messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
      appId: "PASTE_YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const adminState = document.getElementById("adminState");
    const userList = document.getElementById("userList");
    const selectedInfo = document.getElementById("selectedInfo");
    const balanceInput = document.getElementById("balance");
    const titleInput = document.getElementById("title");
    const amountInput = document.getElementById("amount");
    const updateBalanceBtn = document.getElementById("updateBalanceBtn");
    const addTxBtn = document.getElementById("addTxBtn");
    const statusEl = document.getElementById("status");
    const logoutBtn = document.getElementById("logoutBtn");

    let selectedUid = null;
    let selectedUser = null;

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    function formatMoney(value) {
      const num = Number(value) || 0;
      return "$" + num.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function renderSelectedUser() {
      if (!selectedUser) {
        selectedInfo.textContent = "No user selected.";
        return;
      }

      selectedInfo.innerHTML = `
        <div><b>Name:</b> ${selectedUser.fullName || "User"}</div>
        <div><b>Email:</b> ${selectedUser.email || ""}</div>
        <div><b>Balance:</b> ${formatMoney(selectedUser.balance)}</div>
        <div><b>Account:</b> ${selectedUser.accountNumber || "--"}</div>
      `;

      balanceInput.value = Number(selectedUser.balance) || 0;
    }

    function bindUserList() {
      const usersRef = collection(db, "users");
      const usersQuery = query(usersRef, orderBy("fullName"));

      onSnapshot(usersQuery, (snapshot) => {
        if (snapshot.empty) {
          userList.innerHTML = "<div style='color:#bbb;'>No users found.</div>";
          return;
        }

        userList.innerHTML = snapshot.docs.map((snap) => {
          const u = snap.data();
          return `
            <button data-uid="${snap.id}" style="text-align:left; width:100%; padding:12px; border:none; border-radius:8px; background:#1b1b1b; color:white; cursor:pointer;">
              <div style="font-weight:bold;">${u.fullName || "User"}</div>
              <div style="font-size:12px; color:#bbb; margin-top:4px;">${u.email || ""}</div>
            </button>
          `;
        }).join("");

        [...userList.querySelectorAll("button[data-uid]")].forEach((btn) => {
          btn.addEventListener("click", async () => {
            selectedUid = btn.dataset.uid;
            const userRef = doc(db, "users", selectedUid);
            const snap = await getDoc(userRef);

            if (!snap.exists()) {
              statusEl.textContent = "User record not found.";
              return;
            }

            selectedUser = snap.data();
            renderSelectedUser();
            statusEl.textContent = "";
          });
        });
      });
    }

    updateBalanceBtn.addEventListener("click", async () => {
      if (!selectedUid) {
        statusEl.textContent = "Select a user first.";
        return;
      }

      const newBalance = Number(balanceInput.value);
      if (isNaN(newBalance)) {
        statusEl.textContent = "Enter a valid balance.";
        return;
      }

      try {
        await updateDoc(doc(db, "users", selectedUid), {
          balance: newBalance
        });

        selectedUser.balance = newBalance;
        renderSelectedUser();
        statusEl.textContent = "Balance updated.";
      } catch (err) {
        statusEl.textContent = err.message;
      }
    });

    addTxBtn.addEventListener("click", async () => {
      if (!selectedUid) {
        statusEl.textContent = "Select a user first.";
        return;
      }

      const title = titleInput.value.trim();
      const amount = amountInput.value.trim();

      if (!title || !amount) {
        statusEl.textContent = "Enter transaction title and amount.";
        return;
      }

      try {
        await addDoc(collection(db, "users", selectedUid, "transactions"), {
          title,
          amount,
          date: new Date().toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric"
          }),
          createdAt: serverTimestamp()
        });

        titleInput.value = "";
        amountInput.value = "";
        statusEl.textContent = "Transaction added.";
      } catch (err) {
        statusEl.textContent = err.message;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const token = await user.getIdTokenResult();

      if (!token.claims.admin) {
        adminState.textContent = "Access denied. Admin role required.";
        userList.innerHTML = "";
        updateBalanceBtn.disabled = true;
        addTxBtn.disabled = true;
        return;
      }

      adminState.textContent = "Admin access verified.";
      bindUserList();
    });
  </script>

</body>
</html>
