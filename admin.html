<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Norman FCU</title>
</head>

<body style="margin:0; font-family:Arial,sans-serif; min-height:100vh; background:linear-gradient(rgba(0,102,204,0.85), rgba(0,51,153,0.95)), url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a'); background-size:cover; color:white;">

<!-- 🔐 ADMIN PROTECTION -->
<script>
if (localStorage.getItem("adminAccess") !== "true") {
  window.location = "admin-login.html";
}
</script>

<!-- HEADER -->
<div style="padding:20px; background:rgba(0,0,0,0.3); display:flex; justify-content:space-between;">
  <h2>Admin Panel</h2>
  <button onclick="logout()" style="background:red; color:white; border:none; padding:10px; border-radius:6px;">Logout</button>
</div>

<!-- CONTENT -->
<div style="max-width:500px; margin:40px auto; background:white; color:black; padding:20px; border-radius:10px;">

  <h3>Edit Account</h3>

  <input id="balance" placeholder="New Balance" style="width:100%; padding:10px; margin:10px 0;">
  <input id="account" placeholder="Account Number" style="width:100%; padding:10px; margin:10px 0;">
  <input id="routing" placeholder="Routing Number" style="width:100%; padding:10px; margin:10px 0;">

  <button onclick="saveData()" style="width:100%; padding:12px; background:#007bff; color:white; border:none; border-radius:6px;">
    Save Changes
  </button>

</div>

<script>
// LOAD EXISTING DATA
let user = JSON.parse(localStorage.getItem("userData")) || {
  balance: 12450.75,
  account: Math.floor(1000000000 + Math.random() * 9000000000),
  routing: Math.floor(100000000 + Math.random() * 900000000)
};

// FILL INPUTS
document.getElementById("balance").value = user.balance;
document.getElementById("account").value = user.account;
document.getElementById("routing").value = user.routing;

// SAVE DATA
function saveData() {
  user.balance = document.getElementById("balance").value;
  user.account = document.getElementById("account").value;
  user.routing = document.getElementById("routing").value;

  localStorage.setItem("userData", JSON.stringify(user));

  alert("Updated Successfully ✅");
}

// LOGOUT
function logout(){
  localStorage.removeItem("adminAccess");
  window.location = "admin-login.html";
}
</script>

</body>
</html>
